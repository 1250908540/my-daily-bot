name: Morning Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '12 5 * * *'  # 北京时间 13:10 (测试用)
    - cron: '15 12 * * *' # 北京时间 20:15
    - cron: '15 23 * * *' # 北京时间 07:15

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装必要库
        run: pip install requests

      - name: 运行脚本
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
          WEATHER_KEY: ${{ secrets.WEATHER_KEY }}
          TIAN_KEY: ${{ secrets.TIAN_KEY }}
        run: python main.py
